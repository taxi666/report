name: tracking-poc

x-app-env: &app-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_TRACKING_TOPIC: tracking_events
  KAFKA_CLIENT_ID: tracking-api
  KAFKA_CONSUMER_GROUP_ID: tracking-clickhouse-writer
  KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
  CONSUMER_BATCH_SIZE: 500
  CONSUMER_FLUSH_INTERVAL_SECONDS: 1
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_HTTP_PORT: 8123
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ""
  CLICKHOUSE_DATABASE: analytics
  CLICKHOUSE_TRACKING_TABLE: tracking_events

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: tracking-poc-app:latest
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - tracking-net

  consumer:
    image: tracking-poc-app:latest
    command: ["python", "-m", "app.consumer.main"]
    environment:
      <<: *app-env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tracking-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - tracking-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server 127.0.0.1:29092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - tracking-net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic tracking_events \
          --partitions 3 \
          --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 \
          --describe --topic tracking_events
    restart: "no"
    networks:
      - tracking-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: analytics
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-log:/var/log/clickhouse-server
    networks:
      - tracking-net

networks:
  tracking-net:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  clickhouse-data:
  clickhouse-log:
